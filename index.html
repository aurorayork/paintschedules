<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SA Hospitality Paint Schedules</title>
  <style>
    :root {
      --ink: #1f2933;
      --muted: #667085;
      --line: #d8dee8;
      --paper: #fffdf8;
      --soft: #f7f4ed;
      --sa-rose: #f48b7f;
      --sa-peach: #fdd5bc;
      --sa-blush: #faede1;
      --sa-gilt: #ac936d;
      --sa-blue: #5aa6e5;
      --fe-red: #c43632;
      --fe-green: #124718;
      --fe-gold: #bc985e;
      --fe-stone: #e8e1d1;
      --missing: #f0f1f3;
      --shadow: 0 18px 45px rgba(31, 41, 51, .10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(244, 139, 127, .11), transparent 320px),
        linear-gradient(90deg, rgba(188, 152, 94, .10), rgba(90, 166, 229, .08)),
        var(--paper);
      font-family: Inter, Avenir Next, Avenir, Helvetica, Arial, sans-serif;
      line-height: 1.35;
    }

    a { color: inherit; }

    .page {
      width: min(1320px, calc(100% - 40px));
      margin: 0 auto;
      padding: 24px 0 60px;
    }

    .hero {
      border: 1px solid rgba(31, 41, 51, .12);
      background: rgba(255, 255, 255, .78);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .eyebrow {
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: .14em;
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
    }

    h1 {
      margin: 0;
      font-family: Georgia, Times New Roman, serif;
      font-size: clamp(32px, 4.5vw, 54px);
      line-height: .95;
      letter-spacing: 0;
    }

    .hero-copy {
      margin: 14px 0 0;
      max-width: 860px;
      color: var(--muted);
      font-size: 16px;
    }

    .brand-summary {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 16px;
    }

    .summary-block,
    .schedule-card {
      background: white;
      border: 1px solid rgba(31, 41, 51, .16);
      box-shadow: 0 12px 28px rgba(31, 41, 51, .08);
    }

    .summary-block.sa {
      border: 4px solid var(--sa-peach);
      background: white;
    }

    .schedule-card.sa {
      border: 4px solid var(--sa-peach);
    }

    .summary-block.fe {
      border: 3px solid var(--fe-green);
      background: white;
    }

    .schedule-card.fe {
      border: 3px solid var(--fe-green);
    }

    .brand-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 16px;
      color: white;
      font-family: Georgia, Times New Roman, serif;
      font-weight: 800;
      font-size: 24px;
      text-transform: uppercase;
    }

    .brand-title.sa {
      background: var(--sa-rose);
      color: var(--sa-blush);
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: none;
    }
    .brand-title.fe {
      background: var(--fe-green);
      color: var(--fe-red);
      text-shadow: 1px 1px 0 var(--fe-gold);
      letter-spacing: .18em;
    }

    .brand-name {
      display: block;
      line-height: 1;
    }

    .brand-summary-label {
      display: block;
      margin-top: 4px;
      font: 800 10px/1 Inter, Avenir Next, Avenir, Helvetica, Arial, sans-serif;
      letter-spacing: .18em;
      text-transform: uppercase;
      text-shadow: none;
    }

    .count-pill {
      border: 1px solid currentColor;
      border-radius: 999px;
      padding: 5px 9px;
      font: 800 10px/1 Inter, sans-serif;
      text-transform: uppercase;
      background: rgba(255,255,255,.32);
      white-space: nowrap;
    }

    .location-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1px;
      background: white;
      padding: 0;
    }

    .summary-block.sa .location-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1px;
      padding: 8px;
      background: white;
    }

    .summary-block.fe .location-grid {
      gap: 1px;
      padding: 8px;
      background: white;
    }

    .location-row {
      min-height: 42px;
      padding: 8px 10px;
      background: white;
      border-top: 1px solid var(--line);
      border-right: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .summary-block.sa .location-row {
      min-height: 42px;
      grid-template-columns: minmax(0, 1fr) auto;
      background: white;
      border: 1px solid var(--sa-peach);
      color: var(--sa-rose);
      position: static;
      padding-right: 13px;
    }

    .location-row strong {
      display: block;
      font-size: 11px;
      white-space: nowrap;
    }

    .summary-block.fe .location-row {
      min-height: 42px;
      grid-template-columns: minmax(0, 1fr) auto;
      background: white;
      border: 1px solid var(--fe-green);
      color: var(--fe-green);
    }
    .location-row small { color: var(--muted); }
    .summary-block.sa .location-row small { color: #9d5f58; }
    .summary-block.fe .location-row small { color: var(--muted); }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 74px;
      padding: 6px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      border: 1px solid transparent;
    }

    .summary-block.sa .status {
      position: static;
      justify-self: end;
      margin-top: 0;
      min-width: 74px;
      padding: 6px 8px;
      font-size: 10px;
    }

    .status.available { background: #fff176; color: #151515; border-color: #e9da47; }
    .summary-block.sa .status.available {
      background: var(--sa-blush);
      color: var(--sa-rose);
      border-color: var(--sa-peach);
    }
    .summary-block.sa .status.missing {
      background: var(--missing);
      color: #525866;
      border-color: #d6dae1;
    }
    .summary-block.fe .status.available { background: #dcefd6; color: var(--fe-green); border-color: #bdddb2; }
    .status.missing { background: var(--missing); color: #525866; border-color: #d6dae1; }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 3;
      margin: 12px 0 0;
      padding: 8px;
      border: 1px solid rgba(31, 41, 51, .12);
      background: rgba(255, 253, 248, .9);
      backdrop-filter: blur(10px);
      display: grid;
      gap: 7px;
      overflow: visible;
    }

    .toolbar-row {
      display: flex;
      flex-wrap: nowrap;
      gap: 7px;
      overflow: hidden;
    }

    .chip {
      text-decoration: none;
      white-space: nowrap;
      border-radius: 999px;
      border: 1px solid rgba(31, 41, 51, .18);
      background: white;
      padding: 6px 9px;
      font-size: 11px;
      font-weight: 800;
    }

    .chip.sa { border-color: rgba(172,147,109,.5); background: var(--sa-blush); }
    .chip.fe { border-color: rgba(18,71,24,.35); background: var(--fe-stone); color: var(--fe-green); }

    .brand-section {
      margin-top: 28px;
      display: grid;
      gap: 22px;
    }

    #sa-cards,
    #fe-cards {
      display: grid;
      gap: 28px;
    }

    .section-heading {
      margin: 0;
      padding: 12px 16px;
      font-family: Georgia, Times New Roman, serif;
      font-size: 30px;
      border-left: 10px solid;
      background: rgba(255,255,255,.72);
    }

    .section-heading.sa { border-color: var(--sa-peach); }
    .section-heading.fe { border-color: var(--fe-green); }

    .schedule-card {
      overflow: hidden;
      scroll-margin-top: 92px;
    }

    .schedule-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }

    .schedule-head.sa { background: var(--sa-rose); }
    .schedule-head.fe { background: var(--fe-green); }

    .logo-word {
      margin: 0;
      font-family: Georgia, Times New Roman, serif;
      font-size: clamp(24px, 3vw, 38px);
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .logo-word.sa {
      display: inline-block;
      border: 0;
      padding: 7px 12px;
      background: var(--sa-rose);
      color: var(--sa-blush);
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: clamp(30px, 4vw, 52px);
      font-weight: 800;
      letter-spacing: 0;
      text-transform: none;
      white-space: nowrap;
    }

    .schedule-head.sa .subline,
    .schedule-head.sa .date-badge {
      color: var(--sa-blush);
    }

    .logo-word.fe {
      display: inline-block;
      border: 3px solid var(--fe-green);
      padding: 7px 12px;
      color: var(--fe-red);
      background: var(--fe-green);
      text-shadow: 1px 1px 0 var(--fe-gold);
      letter-spacing: .18em;
      white-space: nowrap;
    }

    .schedule-head.fe .subline,
    .schedule-head.fe .date-badge {
      color: var(--fe-stone);
    }

    .subline {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .date-badge {
      justify-self: end;
      align-self: start;
      border: 1px solid currentColor;
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      white-space: nowrap;
      background: rgba(255,255,255,.22);
    }

    .table-wrap { overflow-x: auto; }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 840px;
      table-layout: fixed;
    }

    th {
      padding: 10px 8px;
      background: #f0f0f0;
      border: 1px solid #252525;
      color: #101010;
      font-size: 9px;
      text-transform: uppercase;
      text-align: center;
    }

    td {
      padding: 12px 10px;
      border: 1px solid #686868;
      vertical-align: middle;
      font-size: 11px;
      background: #fff;
      text-align: left;
    }

    td.center { text-align: left; }
    td.vendor { width: 120px; }
    td.color { font-weight: 800; text-align: left; }
    td.directions { font-size: 10px; text-transform: uppercase; }

    .paint-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 52px;
      justify-content: flex-start;
    }

    .swatch {
      width: 64px;
      height: 38px;
      border: 1px solid rgba(31, 41, 51, .22);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.35);
      background: linear-gradient(135deg, #eee, #ccc);
    }

    .swatch.multi {
      width: 100px;
      background: linear-gradient(90deg, #ede2d3 0 20%, #d8be85 20% 40%, #315337 40% 60%, #d5ad76 60% 80%, #5f2c42 80% 100%);
    }

    .swatch.empty {
      background: repeating-linear-gradient(45deg, #f7f7f7, #f7f7f7 8px, #ececec 8px, #ececec 16px);
    }

    .swatch-img {
      display: block;
      max-width: 112px;
      max-height: 70px;
      object-fit: contain;
    }

    .swatch-label {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 10px;
      text-align: center;
      font-weight: 800;
    }

    .website {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 68px;
      border: 1px solid rgba(31, 41, 51, .18);
      border-radius: 999px;
      padding: 7px 9px;
      background: var(--ink);
      color: white;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      text-decoration: none;
    }

    .website.sa { background: var(--sa-blue); color: #07131f; }
    .website.fe { background: var(--fe-green); }

    .missing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 10px;
    }

    .missing-card {
      padding: 14px;
      border: 1px dashed #b8bec8;
      background: rgba(240, 241, 243, .72);
      color: #525866;
    }

    .missing-card strong { display: block; color: var(--ink); }
    .footnote {
      margin-top: 28px;
      padding: 18px;
      border: 1px solid rgba(31, 41, 51, .12);
      background: white;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 900px) {
      .page { width: min(100% - 24px, 1320px); padding-top: 18px; }
      .brand-summary { grid-template-columns: 1fr; }
      .location-grid { grid-template-columns: 1fr; }
      .schedule-head { grid-template-columns: 1fr; }
      .date-badge { justify-self: start; }
    }

    @media print {
      body { background: white; }
      .toolbar { display: none; }
      .page { width: 100%; padding: 0; }
      .schedule-card { break-inside: avoid; box-shadow: none; margin-bottom: 18px; }
      .hero, .summary-block, .footnote { box-shadow: none; }
      .website { color: #0645ad; background: transparent; border-color: #0645ad; }
    }
  </style>
</head>

        { label: "SANT AMBROEUS BROOKFIELD", restaurant: "Brookfield" },
        { label: "SANT AMBROEUS EAST HAMPTON", restaurant: "East Hampton" },
        { label: "SANT AMBROEUS GELATERIA", restaurant: "Gelateria" },
        { label: "SANT AMBROEUS SOUTHAMPTON", restaurant: "Southampton" },
        ...missingSant.slice(0, 6).map((name) => ({ label: `SANT AMBROEUS ${name.toUpperCase()}` })),
        { label: "SANT AMBROEUS WEST 4TH" }
      ],
      fe: [
        { label: "FELICE HUDSON", restaurant: "Hudson" },
        { label: "FELICE 64TH", restaurant: "64th" },
        { label: "FELICE 71ST", restaurant: "71st" },

      ]

    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
    }[char]));

    const linkButton = (url, branch) => url
      ? `<a class="website ${branch}" href="${escapeHtml(url)}" target="_blank" rel="noopener">Website</a>`
      : "";

    const swatch = (color, label) => {
      if (!color) return "";
      const safeLabel = escapeHtml(label || "TBD");
      if (color === "multi") return `<div><div class="swatch multi"></div></div>`;
      if (String(color).startsWith("assets/")) return `<div><img class="swatch-img" src="${escapeHtml(color)}" alt="${safeLabel}" /></div>`;
      const style = color ? `style="background:${escapeHtml(color)}"` : "";
      return `<div><div class="swatch ${color ? "" : "empty"}" ${style}></div></div>`;
    };

    const renderSummary = () => {
      const summary = document.getElementById("summary");
      const byRestaurant = Object.fromEntries(schedules.map((s) => [s.restaurant, s]));
      const renderBlock = (branch, title) => `
        <article class="summary-block ${branch}">
          <div class="brand-title ${branch}">
            <span><span class="brand-name">${title}</span><span class="brand-summary-label">Summary</span></span>
            <span class="count-pill">${summaryLocations[branch].length} locations</span>
          </div>
          <div class="location-grid">
            ${summaryLocations[branch].map((item) => {
              const schedule = item.restaurant ? byRestaurant[item.restaurant] : null;
              const status = schedule ? "available" : "missing";
              const href = schedule ? `#${schedule.id}` : "#summary";
              return `<a class="location-row" href="${href}" style="text-decoration:none">
                <span><strong>${escapeHtml(item.label)}</strong></span>
                <span class="status ${status}">${status}</span>
              </a>`;
            }).join("")}
          </div>
        </article>`;
      summary.innerHTML = renderBlock("sa", "Sant Ambroeus") + renderBlock("fe", "Felice");
    };

    const renderToolbar = () => {
      const label = (s) => s.branch === "fe"
        ? `FELICE ${s.restaurant}`.replace("64th", "64TH").replace("71st", "71ST").replace("83rd", "83RD").replace("Hudson", "HUDSON").replace("Roslyn", "ROSLYN")
        : `SANT AMBROEUS ${s.restaurant.toUpperCase()}`;
      const row = (branch) => schedules.filter((s) => s.branch === branch).map((s) =>
        `<a class="chip ${s.branch}" href="#${s.id}">${escapeHtml(label(s))}</a>`
      ).join("");
      document.getElementById("toolbar").innerHTML = `<div class="toolbar-row">${row("sa")}</div><div class="toolbar-row">${row("fe")}</div>`;
    };

    const renderCard = (schedule) => `
      <article class="schedule-card ${schedule.branch}" id="${schedule.id}">
        <header class="schedule-head ${schedule.branch}">
          <div>
            <h3 class="logo-word ${schedule.branch}">${escapeHtml(schedule.branch === "fe" ? `FELICE ${schedule.restaurant}`.replace("64th", "64TH").replace("71st", "71ST").replace("83rd", "83RD").replace("Hudson", "HUDSON").replace("Roslyn", "ROSLYN") : `Sant Ambroeus ${schedule.restaurant}`)}</h3>
          </div>
          ${schedule.date ? `<div class="date-badge">${escapeHtml(schedule.date)}</div>` : ""}
        </header>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:90px">Location</th>
                <th style="width:118px">Area</th>
                <th style="width:110px">Vendor</th>
                <th style="width:118px">Paint Type and Finish</th>
                <th style="width:122px">Paint Color</th>
                <th style="width:104px">Picture</th>
                <th style="width:74px">Link</th>
                <th style="width:124px">Directions</th>
              </tr>
            </thead>
            <tbody>
              ${schedule.rows.map((row) => `
                <tr>
                  <td class="center">${escapeHtml(row[1])}</td>
                  <td class="center">${escapeHtml(row[2])}</td>
                  <td class="vendor center">${escapeHtml(row[3])}</td>
                  <td class="center">${escapeHtml(row[4])}</td>
                  <td class="color">${escapeHtml(row[5])}</td>
                  <td class="center"><div class="paint-chip">${swatch(row[9], row[5])}</div></td>
                  <td class="center">${linkButton(row[8], schedule.branch)}</td>
                  <td class="directions">${escapeHtml(row[7])}</td>
                </tr>`).join("")}
            </tbody>
          </table>
        </div>
      </article>`;

    const renderSchedules = () => {
      document.getElementById("sa-cards").innerHTML = schedules.filter((s) => s.branch === "sa").map(renderCard).join("");
      document.getElementById("fe-cards").innerHTML = schedules.filter((s) => s.branch === "fe").map(renderCard).join("");
    };

    renderSummary();
    renderToolbar();
    renderSchedules();
  </script>
